name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons (Android mipmap + iOS appiconset)
        run: dart run flutter_launcher_icons

      - name: Generate native splash
        run: dart run flutter_native_splash:create

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
          if-no-files-found: error

  build-admin-web:
    # Builds the moderation admin panel (Flutter Web) so it can be
    # deployed to Firebase Hosting without fighting the Windows file-
    # lock issue that affects the dev workstation. Independent from
    # the APK job so the two run in parallel.
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build admin web
        run: flutter build web -t lib/main_admin.dart --release --no-wasm-dry-run

      - name: Upload admin web artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-web-build
          path: build/web
          retention-days: 7
          if-no-files-found: error
