name: Build Debug APK

# Publishes the debug APK to Firebase Storage with a public download
# token URL. Switched from actions/upload-artifact on 2026-05-14 because
# the GitHub Actions free-tier 500 MB artifact quota was permanently
# saturated even after deleting old runs (GitHub recalculates quota
# every 6–12 h so the new builds still hit "storage quota exceeded").
# Firebase Storage has a 5 GB free tier and the download-token URL
# pattern lets the client download the APK without needing GitHub
# access — same URL refreshes on every push to master.

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons (Android mipmap + iOS appiconset)
        run: dart run flutter_launcher_icons

      - name: Generate native splash
        run: dart run flutter_native_splash:create

      - name: Write SA key + auth gcloud
        env:
          SA_KEY: ${{ secrets.FIREBASE_SA_KEY_PROD }}
        run: |
          if [ -z "$SA_KEY" ]; then
            echo "FIREBASE_SA_KEY_PROD secret is not set."
            exit 1
          fi
          echo "$SA_KEY" > "$RUNNER_TEMP/sa-prod.json"
          gcloud auth activate-service-account --key-file="$RUNNER_TEMP/sa-prod.json"
          gcloud config set project affinity-dating-app-cf807

      - name: Pin debug keystore (stable Google Sign-In SHA-1)
        # CI runners regenerate ~/.android/debug.keystore on every job,
        # giving every APK a different SHA-1 and breaking Google Sign-In
        # because the OAuth client in Firebase is bound to a specific
        # SHA-1. We persist a single keystore in Firebase Storage so
        # the SHA-1 stays constant across every build. Register the
        # echoed SHA-1 once in Firebase Console > Android app, after
        # that all builds keep working.
        run: |
          set -euo pipefail
          BUCKET="affinity-dating-app-cf807.firebasestorage.app"
          KEYSTORE_OBJECT="ci-keystore/debug.keystore"
          KEYSTORE_PATH="$HOME/.android/debug.keystore"
          mkdir -p "$HOME/.android"
          if gcloud storage cp "gs://${BUCKET}/${KEYSTORE_OBJECT}" "$KEYSTORE_PATH" 2>/dev/null; then
            echo "Reused pinned debug keystore from gs://${BUCKET}/${KEYSTORE_OBJECT}"
          else
            echo "No pinned keystore — generating new and uploading."
            keytool -genkeypair -v \
              -keystore "$KEYSTORE_PATH" \
              -alias androiddebugkey \
              -storepass android -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            gcloud storage cp "$KEYSTORE_PATH" "gs://${BUCKET}/${KEYSTORE_OBJECT}"
          fi
          SHA1=$(keytool -list -v -keystore "$KEYSTORE_PATH" -alias androiddebugkey -storepass android 2>/dev/null | grep "SHA1:" | awk '{print $2}')
          {
            echo "## Debug Keystore SHA-1"
            echo ""
            echo "\`\`\`"
            echo "${SHA1}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
          # Expose to later steps without touching environment files.
          echo "SHA1_FINGERPRINT=${SHA1}" >> "$GITHUB_ENV"

      - name: Register SHA-1 + sync google-services.json from Firebase
        # The deploy SA owns enough rights to register additional SHA
        # fingerprints on the Android app and to fetch the canonical
        # google-services.json. Doing it here keeps the operator out of
        # the loop: every build (a) ensures the pinned debug keystore is
        # in Firebase's allow-list and (b) ships the matching config
        # file, so Google Sign-In keeps working without manual console
        # clicks. Failures are non-fatal so a brief API outage doesn't
        # block APK delivery — the prior committed google-services.json
        # is reused.
        run: |
          set -uo pipefail
          PROJECT_ID="affinity-dating-app-cf807"
          APP_ID="1:156489398688:android:77e8ecdd2961c6ae984cc5"
          SHA1_HEX=$(printf '%s' "${SHA1_FINGERPRINT}" | tr -d ':' | tr 'A-Z' 'a-z')
          TOKEN=$(gcloud auth print-access-token)

          # ── register SHA-1 (idempotent) ─────────────────────────────
          REG_STATUS=$(curl -sS -o /tmp/sha-resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"shaHash\":\"${SHA1_HEX}\",\"certType\":\"SHA_1\"}" \
            "https://firebase.googleapis.com/v1beta1/projects/${PROJECT_ID}/androidApps/${APP_ID}/sha")
          if [ "${REG_STATUS}" = "200" ] || [ "${REG_STATUS}" = "201" ]; then
            echo "SHA-1 registered with Firebase."
          elif grep -qi 'already exists\|ALREADY_EXISTS' /tmp/sha-resp.json 2>/dev/null; then
            echo "SHA-1 already registered (idempotent — fine)."
          else
            echo "SHA-1 registration returned HTTP ${REG_STATUS}:"
            cat /tmp/sha-resp.json || true
            echo "Continuing — Sign-In may not work on this APK."
          fi

          # ── pull latest google-services.json (defensive) ────────────
          # Firebase's `androidApps/.../config` endpoint can return a
          # stale config for several minutes after a fresh SHA-1
          # registration (its caching layer doesn't always invalidate
          # immediately). If we always overwrite with the synced copy,
          # we sometimes shipped an APK whose google-services.json was
          # MISSING the OAuth client for the just-registered keystore
          # SHA — and the client got "Google Sign-In no configurado…"
          # even though both API calls in this step had reported
          # success (client 2026-05-19 #1).
          #
          # Defence: only overwrite when the synced file contains an
          # OAuth client whose `certificate_hash` matches our pinned
          # SHA. Otherwise keep the committed file, which is updated
          # explicitly when a new SHA is added.
          CFG_STATUS=$(curl -sS -o /tmp/cfg-resp.json -w "%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://firebase.googleapis.com/v1beta1/projects/${PROJECT_ID}/androidApps/${APP_ID}/config")
          if [ "${CFG_STATUS}" = "200" ]; then
            # `sync` overwrites android/app/google-services.json only
            # when the Firebase response contains the pinned SHA's
            # OAuth client — defends against Firebase's eventual-
            # consistency cache returning a stale config and clobbering
            # the committed file (client 2026-05-19 #1).
            python3 scripts/ci/check_google_services.py sync /tmp/cfg-resp.json
          else
            echo "Could not fetch google-services.json (HTTP ${CFG_STATUS}); keeping committed version."
            cat /tmp/cfg-resp.json || true
          fi

          # Hard guard — if the file we'd ship with STILL doesn't list
          # the keystore SHA, fail the build instead of producing a
          # silently broken APK.
          python3 scripts/ci/check_google_services.py verify

      - name: Build debug APK
        # APPLE_SERVICE_ID enables Apple Sign-In's web/OAuth path on
        # Android (required because the native ASAuthorization flow is
        # iOS-only). When the secret is unset the build still succeeds
        # but Apple Sign-In on Android falls back to the iOS-only path
        # and surfaces a friendly error instead of silently breaking.
        env:
          APPLE_SERVICE_ID: ${{ secrets.APPLE_SERVICE_ID }}
        run: |
          flutter build apk --debug \
            --dart-define=APPLE_SERVICE_ID="${APPLE_SERVICE_ID}"

      - name: Audit APK signing certificate (cross-check vs keystore SHA)
        # Run apksigner on the produced APK and dump everything — the
        # earlier version filtered for a specific "SHA-1 digest" line
        # via grep and came back empty (apksigner's output format
        # apparently differs on this runner), so we print the full
        # `--verbose --print-certs` block plus a manual unzip + keytool
        # readout of META-INF/*.RSA as a backup path. One of the two
        # WILL give us the actual signing SHA.
        run: |
          set -uo pipefail
          APK=build/app/outputs/flutter-apk/app-debug.apk
          echo "============ Pinned keystore SHA-1 ============"
          echo "${SHA1_FINGERPRINT}"
          echo ""
          echo "============ APK exists? ============"
          ls -la "$APK" || true
          echo ""
          echo "============ apksigner search ============"
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          APKSIGNER="${BUILD_TOOLS}apksigner"
          if [ ! -x "$APKSIGNER" ]; then
            APKSIGNER=$(command -v apksigner || true)
          fi
          echo "Resolved apksigner: ${APKSIGNER:-<not found>}"
          if [ -n "$APKSIGNER" ] && [ -x "$APKSIGNER" ]; then
            echo ""
            echo "============ apksigner verify --print-certs --verbose ============"
            "$APKSIGNER" verify --verbose --print-certs "$APK" 2>&1 || true
          fi
          echo ""
          echo "============ Manual META-INF/CERT keytool readout ============"
          mkdir -p /tmp/apkcerts && cd /tmp/apkcerts
          unzip -o -j "$GITHUB_WORKSPACE/$APK" 'META-INF/*.RSA' 'META-INF/*.DSA' 'META-INF/*.EC' 2>/dev/null || true
          for f in *.RSA *.DSA *.EC; do
            [ -f "$f" ] || continue
            echo "--- $f ---"
            keytool -printcert -file "$f" 2>&1 | grep -E "SHA1|SHA-1|Owner" || true
          done

      - name: Upload APK to Firebase Storage (public download token)
        run: |
          set -euo pipefail
          BUCKET="affinity-dating-app-cf807.firebasestorage.app"
          OBJECT="public-apk/app-debug.apk"
          # Stable UUID-shaped token kept identical across runs so the
          # client always uses the SAME download URL — every push
          # refreshes the APK in place. If a leak ever happens, rotate
          # by changing this constant in one place.
          TOKEN="affinity-apk-7f3c8d92"
          gcloud storage cp \
            build/app/outputs/flutter-apk/app-debug.apk \
            "gs://${BUCKET}/${OBJECT}" \
            --custom-metadata="firebaseStorageDownloadTokens=${TOKEN}"
          # Build the public URL — slashes encoded as %2F per the
          # Firebase Storage download URL convention.
          OBJECT_ENCODED=$(printf '%s' "${OBJECT}" | sed 's|/|%2F|g')
          URL="https://firebasestorage.googleapis.com/v0/b/${BUCKET}/o/${OBJECT_ENCODED}?alt=media&token=${TOKEN}"
          {
            echo "## APK Download URL"
            echo ""
            echo "Commit: \`${GITHUB_SHA}\`"
            echo ""
            echo "[Download app-debug.apk](${URL})"
            echo ""
            echo "Direct link (share with client):"
            echo ""
            echo "\`\`\`"
            echo "${URL}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-admin-web:
    # Smoke-test compile for the moderator admin panel on every push.
    # The actual deployment is handled by deploy-production.yml; we
    # build here only to catch breakage before someone triggers the
    # manual deploy. No artifact upload (quota).
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build admin web (smoke test)
        run: flutter build web -t lib/main_admin.dart --release --no-wasm-dry-run
