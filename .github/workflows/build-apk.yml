name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons (Android mipmap + iOS appiconset)
        run: dart run flutter_launcher_icons

      - name: Generate native splash
        run: dart run flutter_native_splash:create

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          # Per-commit name keeps multiple builds reachable without
          # blowing the storage quota — older runs auto-expire after 3
          # days. Previous "app-debug-apk" hit the 500 MB free-tier
          # cap on 2026-04-30; trimming retention is the smallest fix
          # that doesn't strand the latest build behind quota errors.
          name: app-debug-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 3
          if-no-files-found: error
          compression-level: 9

  build-admin-web:
    # Compiles the moderator admin panel (Flutter Web) on every push.
    # The build/web tree is uploaded as an artifact so it can be deployed
    # to Firebase Hosting from a local machine using the production SA
    # key (sa-key-prod.json) when the in-CI deploy-production workflow
    # is blocked by IAM propagation. Retention is 3 days to stay under
    # the GitHub Actions storage quota.
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build admin web
        run: flutter build web -t lib/main_admin.dart --release --no-wasm-dry-run

      - name: Upload admin web artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-web-${{ github.sha }}
          path: build/web
          retention-days: 3
          if-no-files-found: error
          compression-level: 9
