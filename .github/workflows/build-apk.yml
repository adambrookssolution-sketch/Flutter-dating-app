name: Build Debug APK

# Publishes the debug APK to Firebase Storage with a public download
# token URL. Switched from actions/upload-artifact on 2026-05-14 because
# the GitHub Actions free-tier 500 MB artifact quota was permanently
# saturated even after deleting old runs (GitHub recalculates quota
# every 6–12 h so the new builds still hit "storage quota exceeded").
# Firebase Storage has a 5 GB free tier and the download-token URL
# pattern lets the client download the APK without needing GitHub
# access — same URL refreshes on every push to master.

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons (Android mipmap + iOS appiconset)
        run: dart run flutter_launcher_icons

      - name: Generate native splash
        run: dart run flutter_native_splash:create

      - name: Write SA key + auth gcloud
        env:
          SA_KEY: ${{ secrets.FIREBASE_SA_KEY_PROD }}
        run: |
          if [ -z "$SA_KEY" ]; then
            echo "FIREBASE_SA_KEY_PROD secret is not set."
            exit 1
          fi
          echo "$SA_KEY" > "$RUNNER_TEMP/sa-prod.json"
          gcloud auth activate-service-account --key-file="$RUNNER_TEMP/sa-prod.json"
          gcloud config set project affinity-dating-app-cf807

      - name: Pin debug keystore (stable Google Sign-In SHA-1)
        # CI runners regenerate ~/.android/debug.keystore on every job,
        # giving every APK a different SHA-1 and breaking Google Sign-In
        # because the OAuth client in Firebase is bound to a specific
        # SHA-1. We persist a single keystore in Firebase Storage so
        # the SHA-1 stays constant across every build. Register the
        # echoed SHA-1 once in Firebase Console > Android app, after
        # that all builds keep working.
        run: |
          set -euo pipefail
          BUCKET="affinity-dating-app-cf807.firebasestorage.app"
          KEYSTORE_OBJECT="ci-keystore/debug.keystore"
          KEYSTORE_PATH="$HOME/.android/debug.keystore"
          mkdir -p "$HOME/.android"
          if gcloud storage cp "gs://${BUCKET}/${KEYSTORE_OBJECT}" "$KEYSTORE_PATH" 2>/dev/null; then
            echo "Reused pinned debug keystore from gs://${BUCKET}/${KEYSTORE_OBJECT}"
          else
            echo "No pinned keystore — generating new and uploading."
            keytool -genkeypair -v \
              -keystore "$KEYSTORE_PATH" \
              -alias androiddebugkey \
              -storepass android -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            gcloud storage cp "$KEYSTORE_PATH" "gs://${BUCKET}/${KEYSTORE_OBJECT}"
          fi
          SHA1=$(keytool -list -v -keystore "$KEYSTORE_PATH" -alias androiddebugkey -storepass android 2>/dev/null | grep "SHA1:" | awk '{print $2}')
          {
            echo "## Debug Keystore SHA-1"
            echo ""
            echo "Register this fingerprint **once** in Firebase Console:"
            echo "Project settings > Your apps > Android app (com.example.app) > Add fingerprint."
            echo ""
            echo "\`\`\`"
            echo "${SHA1}"
            echo "\`\`\`"
            echo ""
            echo "After registering, **download the updated google-services.json** from Firebase Console and commit it to \`android/app/google-services.json\`. From then on Google Sign-In works on every CI-built APK."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build debug APK
        # APPLE_SERVICE_ID enables Apple Sign-In's web/OAuth path on
        # Android (required because the native ASAuthorization flow is
        # iOS-only). When the secret is unset the build still succeeds
        # but Apple Sign-In on Android falls back to the iOS-only path
        # and surfaces a friendly error instead of silently breaking.
        env:
          APPLE_SERVICE_ID: ${{ secrets.APPLE_SERVICE_ID }}
        run: |
          flutter build apk --debug \
            --dart-define=APPLE_SERVICE_ID="${APPLE_SERVICE_ID}"

      - name: Upload APK to Firebase Storage (public download token)
        run: |
          set -euo pipefail
          BUCKET="affinity-dating-app-cf807.firebasestorage.app"
          OBJECT="public-apk/app-debug.apk"
          # Stable UUID-shaped token kept identical across runs so the
          # client always uses the SAME download URL — every push
          # refreshes the APK in place. If a leak ever happens, rotate
          # by changing this constant in one place.
          TOKEN="affinity-apk-7f3c8d92"
          gcloud storage cp \
            build/app/outputs/flutter-apk/app-debug.apk \
            "gs://${BUCKET}/${OBJECT}" \
            --custom-metadata="firebaseStorageDownloadTokens=${TOKEN}"
          # Build the public URL — slashes encoded as %2F per the
          # Firebase Storage download URL convention.
          OBJECT_ENCODED=$(printf '%s' "${OBJECT}" | sed 's|/|%2F|g')
          URL="https://firebasestorage.googleapis.com/v0/b/${BUCKET}/o/${OBJECT_ENCODED}?alt=media&token=${TOKEN}"
          {
            echo "## APK Download URL"
            echo ""
            echo "Commit: \`${GITHUB_SHA}\`"
            echo ""
            echo "[Download app-debug.apk](${URL})"
            echo ""
            echo "Direct link (share with client):"
            echo ""
            echo "\`\`\`"
            echo "${URL}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-admin-web:
    # Smoke-test compile for the moderator admin panel on every push.
    # The actual deployment is handled by deploy-production.yml; we
    # build here only to catch breakage before someone triggers the
    # manual deploy. No artifact upload (quota).
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build admin web (smoke test)
        run: flutter build web -t lib/main_admin.dart --release --no-wasm-dry-run
