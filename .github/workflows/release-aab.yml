name: Release AAB (Play Store)

# Produces a signed Android App Bundle (.aab) for upload to Google Play
# Console. Manually triggered — we don't want to burn a release build
# (or rotate the upload URL) on every push to master. The companion
# build-apk.yml continues to ship debug APKs for client smoke-test.
#
# Required GitHub Secrets:
#   RELEASE_KEYSTORE_BASE64    — base64-encoded .jks/.keystore file
#                                (produced by: `base64 -w0 release.jks`)
#   RELEASE_KEYSTORE_PASSWORD  — keystore password
#   RELEASE_KEY_ALIAS          — alias of the signing key inside the keystore
#   RELEASE_KEY_PASSWORD       — password for that alias
#   FIREBASE_SA_KEY_PROD       — service-account key (reused from build-apk.yml)
#   APPLE_SERVICE_ID           — Apple Sign-In Service ID (reused)
#
# Phase 2 (after Play Console is set up and a service account is enrolled
# for the Google Play Developer API):
#   - Upload to Play Console internal track via fastlane supply, replacing
#     the manual "download the AAB and upload it through the UI" step.

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Target distribution channel (internal, alpha, beta, production)'
        type: choice
        default: internal
        options: [internal, alpha, beta, production]

jobs:
  aab:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons + native splash
        run: |
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: Materialise release keystore from secret
        # The .jks/.keystore binary is stored base64-encoded in the
        # secret so it survives GitHub's plain-text secret store. We
        # decode to a path outside the workspace so a `flutter clean`
        # can't accidentally wipe it mid-build, and the path is fed to
        # AGP via RELEASE_KEYSTORE_PATH which our build.gradle.kts
        # release signingConfig reads.
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is not set."
            echo "Generate a keystore with:"
            echo "  keytool -genkey -v -keystore release.jks \\"
            echo "    -keyalg RSA -keysize 2048 -validity 10000 \\"
            echo "    -alias affinity-upload"
            echo "Then: base64 -w0 release.jks  → paste into the secret."
            exit 1
          fi
          KEYSTORE_PATH="$RUNNER_TEMP/release.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          if [ ! -s "$KEYSTORE_PATH" ]; then
            echo "::error::Decoded keystore is empty — secret may be malformed."
            exit 1
          fi
          echo "RELEASE_KEYSTORE_PATH=${KEYSTORE_PATH}" >> "$GITHUB_ENV"
          # Print the upload-cert SHA-1 for the release record — Play
          # Console asks for this when registering for app signing and
          # we need it to mirror in Firebase if Google Sign-In is to
          # keep working on the release track.
          {
            echo "## Release keystore upload-cert SHA-1"
            echo ""
            echo "\`\`\`"
            keytool -list -v -keystore "$KEYSTORE_PATH" \
              -alias "${{ secrets.RELEASE_KEY_ALIAS }}" \
              -storepass "${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" 2>/dev/null \
              | grep -E "SHA1|SHA-1" || true
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build signed AAB
        env:
          APPLE_SERVICE_ID: ${{ secrets.APPLE_SERVICE_ID }}
          RELEASE_KEYSTORE_PATH: ${{ env.RELEASE_KEYSTORE_PATH }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --dart-define=APPLE_SERVICE_ID="${APPLE_SERVICE_ID}"

      - name: Write SA key + auth gcloud
        env:
          SA_KEY: ${{ secrets.FIREBASE_SA_KEY_PROD }}
        run: |
          set -euo pipefail
          if [ -z "$SA_KEY" ]; then
            echo "::error::FIREBASE_SA_KEY_PROD secret is not set."
            exit 1
          fi
          echo "$SA_KEY" > "$RUNNER_TEMP/sa-prod.json"
          gcloud auth activate-service-account --key-file="$RUNNER_TEMP/sa-prod.json"
          gcloud config set project affinity-dating-app-cf807

      - name: Upload AAB to Firebase Storage (private, run-scoped path)
        # Release artifacts are private — the URL is run-scoped (commit
        # SHA + run id in the path) so they're not enumerable. The team
        # downloads via the signed URL printed in the run summary;
        # client doesn't see the AAB, only the eventual Play Store
        # listing.
        run: |
          set -euo pipefail
          BUCKET="affinity-dating-app-cf807.firebasestorage.app"
          OBJECT="release-aab/${GITHUB_SHA}-${GITHUB_RUN_ID}/app-release.aab"
          gcloud storage cp \
            build/app/outputs/bundle/release/app-release.aab \
            "gs://${BUCKET}/${OBJECT}"
          SIGNED_URL=$(gcloud storage sign-url \
            "gs://${BUCKET}/${OBJECT}" \
            --duration=7d \
            --format='value(signed_url)' 2>/dev/null || true)
          {
            echo "## Release AAB"
            echo ""
            echo "Track: \`${{ inputs.track }}\`"
            echo "Commit: \`${GITHUB_SHA}\`"
            echo ""
            echo "Storage path:"
            echo ""
            echo "\`\`\`"
            echo "gs://${BUCKET}/${OBJECT}"
            echo "\`\`\`"
            if [ -n "$SIGNED_URL" ]; then
              echo ""
              echo "7-day signed download URL (paste into Play Console):"
              echo ""
              echo "\`\`\`"
              echo "${SIGNED_URL}"
              echo "\`\`\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
