name: Build iOS (smoke test)

# Parallels build-apk.yml on the iOS side. For now this is a smoke
# test only — we compile the Flutter app for an iOS target using
# `--no-codesign` so we don't yet need provisioning profiles or
# distribution certificates uploaded as repo secrets. The job catches
# iOS-specific compile / pod / dependency issues early so we don't
# discover them the day we try to ship to TestFlight.
#
# Phase 2 (after Felix's Individual Apple Developer enrolment is
# confirmed): add a release job that uses fastlane match (or stored
# .p12 + provisioning profile secrets) to produce a signed IPA and
# upload it to TestFlight via App Store Connect API.

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install pub dependencies
        run: flutter pub get

      - name: Generate launcher icons + native splash
        # Matches the Android workflow. flutter_launcher_icons writes
        # the Affinity brand icon into ios/Runner/Assets.xcassets/
        # AppIcon.appiconset/, overwriting Flutter's default beige
        # scaffolding (which is what was committed). Without this step
        # the App Store build would ship the Flutter logo as our app
        # icon, which would also fail App Review.
        run: |
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: Auth to Google Cloud
        # macos-latest runners (unlike ubuntu-latest) ship without
        # gcloud. The official `auth` + `setup-gcloud` actions install
        # the SDK AND wire the service-account credentials in one shot
        # — equivalent to the build-apk.yml pattern of
        # `gcloud auth activate-service-account --key-file=...` but
        # portable to the macOS runner.
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SA_KEY_PROD }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: affinity-dating-app-cf807

      - name: Sync iOS GoogleService-Info.plist from Firebase
        # The plist is required at app launch — Firebase.initializeApp()
        # throws if it can't find it in the bundle. We register it in
        # project.pbxproj's PBXResourcesBuildPhase so the build copies it
        # into the .app, and fetch the latest contents from the Firebase
        # Management API here so we never ship a stale config. The Android
        # side uses the same pattern (build-apk.yml's "Register SHA-1 +
        # sync google-services.json" step).
        #
        # If no iOS app is yet registered in the Firebase project with
        # bundleId com.affinitysocialclub.app, we create one — this is
        # idempotent so subsequent runs no-op. Phase 2 will mirror the
        # Android SHA-registration trick for iOS APNs auth keys.
        run: |
          set -uo pipefail
          PROJECT_ID="affinity-dating-app-cf807"
          BUNDLE_ID="com.affinitysocialclub.app"
          TOKEN=$(gcloud auth print-access-token)

          # ── find existing iOS app for this bundle id ────────────────
          curl -sS -H "Authorization: Bearer ${TOKEN}" \
            "https://firebase.googleapis.com/v1beta1/projects/${PROJECT_ID}/iosApps" \
            > /tmp/ios-apps.json
          APP_NAME=$(python3 -c "
          import json, sys
          d = json.load(open('/tmp/ios-apps.json'))
          for app in d.get('apps', []):
              if app.get('bundleId') == '${BUNDLE_ID}':
                  print(app.get('name', ''))
                  break
          ")

          # ── create one if missing ───────────────────────────────────
          if [ -z "$APP_NAME" ]; then
            echo "No iOS app for bundle ${BUNDLE_ID} — creating."
            CREATE_STATUS=$(curl -sS -o /tmp/ios-create.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"bundleId\":\"${BUNDLE_ID}\",\"displayName\":\"Affinity iOS\"}" \
              "https://firebase.googleapis.com/v1beta1/projects/${PROJECT_ID}/iosApps")
            if [ "${CREATE_STATUS}" != "200" ]; then
              echo "::error::iOS app creation returned HTTP ${CREATE_STATUS}:"
              cat /tmp/ios-create.json || true
              exit 1
            fi
            # The create response is a long-running operation; poll for
            # completion (usually <5s).
            OP_NAME=$(python3 -c "import json; print(json.load(open('/tmp/ios-create.json')).get('name',''))")
            for i in $(seq 1 30); do
              curl -sS -H "Authorization: Bearer ${TOKEN}" \
                "https://firebase.googleapis.com/v1beta1/${OP_NAME}" > /tmp/op.json
              DONE=$(python3 -c "import json; print(json.load(open('/tmp/op.json')).get('done', False))")
              if [ "$DONE" = "True" ]; then
                APP_NAME=$(python3 -c "import json; d=json.load(open('/tmp/op.json')).get('response', {}); print(d.get('name', ''))")
                break
              fi
              sleep 2
            done
            if [ -z "$APP_NAME" ]; then
              echo "::error::iOS app creation didn't complete in time."
              cat /tmp/op.json || true
              exit 1
            fi
          fi
          echo "iOS app: ${APP_NAME}"

          # ── fetch the config plist ──────────────────────────────────
          CFG_STATUS=$(curl -sS -o /tmp/ios-cfg.json -w "%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://firebase.googleapis.com/v1beta1/${APP_NAME}/config")
          if [ "${CFG_STATUS}" != "200" ]; then
            echo "::error::Could not fetch GoogleService-Info.plist (HTTP ${CFG_STATUS}):"
            cat /tmp/ios-cfg.json || true
            exit 1
          fi
          # `configFileContents` is base64-encoded plist XML.
          python3 -c "
          import json, base64, sys
          d = json.load(open('/tmp/ios-cfg.json'))
          contents = base64.b64decode(d['configFileContents'])
          open('ios/Runner/GoogleService-Info.plist', 'wb').write(contents)
          print(f'Wrote ios/Runner/GoogleService-Info.plist ({len(contents)} bytes)')
          "
          # Sanity: the plist MUST declare the right bundle id, otherwise
          # Firebase init will silently fail to authenticate on launch.
          if ! grep -q "${BUNDLE_ID}" ios/Runner/GoogleService-Info.plist; then
            echo "::error::Synced plist doesn't reference ${BUNDLE_ID}."
            exit 1
          fi

      - name: Patch Info.plist with REVERSED_CLIENT_ID for Google Sign-In
        # Info.plist registers `$(REVERSED_CLIENT_ID)` as a custom URL
        # scheme so Google Sign-In's OAuth redirect lands back in the
        # app. The token between $( ) is meant to be a build setting,
        # but nothing defines REVERSED_CLIENT_ID in our xcconfigs — so
        # Xcode leaves the literal string in, and OAuth redirects 404
        # back to Safari instead of opening the app. We resolve it
        # ourselves from the just-synced GoogleService-Info.plist.
        run: |
          set -euo pipefail
          REV_ID=$(python3 -c "
          import plistlib
          with open('ios/Runner/GoogleService-Info.plist', 'rb') as f:
              print(plistlib.load(f).get('REVERSED_CLIENT_ID', ''))
          ")
          if [ -z "$REV_ID" ]; then
            echo "::error::REVERSED_CLIENT_ID missing from GoogleService-Info.plist."
            exit 1
          fi
          # macOS sed requires an empty -i argument.
          sed -i '' "s|\$(REVERSED_CLIENT_ID)|${REV_ID}|g" ios/Runner/Info.plist
          echo "Patched Info.plist URL scheme: ${REV_ID}"

      - name: Install CocoaPods
        # ios/Podfile is committed (pinned to platform 14.0). We do NOT
        # regenerate it via `flutter create` — that writes platform 12.0
        # which fails to resolve modern firebase_messaging /
        # video_player_avfoundation pods (build-ios run 26183292622).
        working-directory: ios
        run: |
          pod install --repo-update

      - name: Build iOS (no codesign — smoke test)
        env:
          APPLE_SERVICE_ID: ${{ secrets.APPLE_SERVICE_ID }}
        run: |
          # Same dart-define wiring as the APK build so Apple Sign-In's
          # web/OAuth path stays consistent between platforms.
          flutter build ios --release --no-codesign \
            --dart-define=APPLE_SERVICE_ID="${APPLE_SERVICE_ID}"
