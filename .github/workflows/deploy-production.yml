name: Deploy to Production

# Manual trigger only — protects production from accidental pushes.
# Required GitHub repo Secrets:
#   FIREBASE_SA_KEY_PROD  — full JSON of the production service-account key
# Optional GitHub Variables (can be left unset on first deploy):
#   STRIPE_SECRET_KEY     — production Stripe live key (or test key)
#   STRIPE_WEBHOOK_SECRET — production Stripe webhook signing secret
#
# Before the FIRST run, the project owner must enable these APIs on
# affinity-dating-app-cf807 in GCP Console (the bound SA does not have
# rights to do this itself):
#   - cloudfunctions.googleapis.com
#   - cloudbuild.googleapis.com
#   - artifactregistry.googleapis.com
#   - eventarc.googleapis.com
#   - run.googleapis.com
#   - pubsub.googleapis.com
#   - cloudscheduler.googleapis.com

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - functions
          - rules-and-indexes
          - hosting

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Flutter
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'hosting' }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Write SA key to disk
        env:
          SA_KEY: ${{ secrets.FIREBASE_SA_KEY_PROD }}
        run: |
          if [ -z "$SA_KEY" ]; then
            echo "FIREBASE_SA_KEY_PROD secret is not set."
            exit 1
          fi
          echo "$SA_KEY" > $RUNNER_TEMP/sa-prod.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa-prod.json" >> $GITHUB_ENV

      - name: Install firebase-tools
        run: npm install -g firebase-tools@latest

      - name: Install function deps + build
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'functions' }}
        run: |
          cd functions
          npm ci
          npm run build

      - name: Build admin web (Flutter)
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'hosting' }}
        run: |
          flutter pub get
          flutter build web -t lib/main_admin.dart --release --no-wasm-dry-run

      - name: Set Stripe secrets (no-op if absent)
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'functions' }}
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          if [ -n "$STRIPE_SECRET_KEY" ]; then
            printf '%s' "$STRIPE_SECRET_KEY" | firebase functions:secrets:set STRIPE_SECRET_KEY --project=affinity-dating-app-cf807 --data-file=-
          else
            echo "STRIPE_SECRET_KEY not provided — Stripe-dependent functions will deploy as dormant."
          fi
          if [ -n "$STRIPE_WEBHOOK_SECRET" ]; then
            printf '%s' "$STRIPE_WEBHOOK_SECRET" | firebase functions:secrets:set STRIPE_WEBHOOK_SECRET --project=affinity-dating-app-cf807 --data-file=-
          fi

      - name: Deploy (functions)
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'functions' }}
        run: firebase deploy --only functions --project=affinity-dating-app-cf807 --force --non-interactive

      - name: Deploy (firestore + storage rules + indexes)
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'rules-and-indexes' }}
        run: firebase deploy --only firestore,storage --project=affinity-dating-app-cf807 --force --non-interactive

      - name: Deploy (hosting — admin panel)
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'hosting' }}
        run: firebase deploy --only hosting:admin --project=affinity-dating-app-cf807 --force --non-interactive --debug
